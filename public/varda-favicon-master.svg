<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <mask id="cutout">
      <rect width="512" height="512" fill="white" />
      <line x1="126" y1="126" x2="306" y2="386" stroke="black" stroke-width="96" stroke-linecap="square" />
    </mask>
  </defs>

  <!-- Deep Charcoal / Pure Black Background -->
  <rect width="512" height="512" fill="#101010" />

  <!-- Champagne Gold Monogram -->
  <g fill="none" stroke="#D4AF37" stroke-linecap="square">
    <!-- Right stroke (goes behind) -->
    <line x1="386" y1="126" x2="206" y2="386" stroke-width="32" mask="url(#cutout)" />
    <!-- Left stroke (in front) -->
    <line x1="126" y1="126" x2="306" y2="386" stroke-width="32" />
  </g>
</svg>
