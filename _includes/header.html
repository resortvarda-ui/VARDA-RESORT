<header class="site-header" id="masterHeader">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="logo" aria-label="Varda Resort Homepage">
        <span class="logo-main">VARDA</span>
        <span class="logo-sub">Resort & Restaurant</span>
      </a>

      <nav aria-label="Main navigation">
        <ul class="nav-links" id="navMenu">
          {% for item in site.data.navigation %}
          <li>
            <a href="{{ item.url | relative_url }}" class="nav-link {% if page.nav_key == item.key %}active{% endif %}">
              {{ item.title }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </nav>

      <div class="header-cta">
        <a href="/booking/" class="btn btn-gold"><span>Book Now</span></a>
      </div>

      <button class="mobile-menu-btn" id="mobileToggle" type="button"
              aria-label="Toggle Navigation Menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
