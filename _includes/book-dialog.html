<!-- Booking Dialog -->
<div class="booking-overlay" id="bookingOverlay" role="dialog" aria-modal="true" aria-labelledby="bookingTitle">
  <div class="booking-dialog" style="position: relative;">
    <button class="dialog-close" id="closeBooking" aria-label="Close dialog">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
    </button>

    <div style="text-align: center; margin-bottom: var(--space-lg);">
      <span class="label-luxury">Reservations</span>
      <h2 id="bookingTitle" style="font-family: var(--font-display); font-size: 2rem; color: var(--text-primary); margin-top: 12px;">Reserve Your Stay</h2>
      <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">Choose how you would like to connect with us.</p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 16px;">
      <a href="tel:{{ site.phone | replace: ' ', '' }}" class="btn btn-gold" style="width: 100%; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>Call to Reserve</span>
      </a>
      <a href="https://wa.me/910000000000?text=Hello%20Varda%20Resort,%20I%20would%20like%20to%20book%20a%20room." class="btn btn-outline" style="width: 100%; justify-content: center;" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span>WhatsApp Us</span>
      </a>
    </div>
  </div>
</div>
