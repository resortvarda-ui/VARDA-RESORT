<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  {% seo %}

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- Fonts — Playfair Display + Inter + Cormorant Garamond -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"></noscript>

  <!-- Preload Hero Image -->
  {% if page.hero_image %}
  <link rel="preload" href="{{ page.hero_image | relative_url }}" as="image">
  {% endif %}

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% for stylesheet in page.stylesheets %}
  <link rel="stylesheet" href="{{ stylesheet | relative_url }}">
  {% endfor %}

  <!-- Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Hotel",
    "name": "{{ site.title }}",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}",
    "logo": "{{ site.url }}{{ site.logo }}",
    "image": "{{ site.url }}{{ site.image }}",
    "telephone": "{{ site.phone }}",
    "priceRange": "₹₹₹₹",
    "starRating": { "@type": "Rating", "ratingValue": "5" },
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ site.address }}",
      "addressLocality": "Buxar",
      "addressRegion": "Bihar",
      "addressCountry": "IN"
    }
  }
  </script>
</head>
<body class="{{ page.body_class | default: 'site-page' }}" data-page="{{ page.nav_key | default: '' }}">
  {% include header.html %}

  <main id="content">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include book-dialog.html %}

  <!-- Scripts -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  {% for script in page.scripts %}
  <script src="{{ script | relative_url }}" defer></script>
  {% endfor %}
</body>
</html>
