<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  {% seo %}

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://images.unsplash.com">

  <!-- Fonts — Cormorant Garamond + Poppins + Montserrat -->

  <!-- Preload Hero Image -->
  {% if page.hero_image %}
  <link rel="preload" href="{{ page.hero_image | relative_url }}" as="image" fetchpriority="high">
  {% endif %}

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% for stylesheet in page.stylesheets %}
  <link rel="stylesheet" href="{{ stylesheet | relative_url }}?v={{ site.time | date: '%s' }}">
  {% endfor %}


  <!-- Schema -->

    "@graph": [
      {
        "@type": ["Hotel", "LocalBusiness", "Organization"],
        "@id": "{{ site.url }}/#organization",
        "name": "{{ site.title }}",
        "description": "{{ site.description }}",
        "url": "{{ site.url }}",
        "logo": "{{ site.url }}{{ site.logo }}",
        "image": "{{ site.url }}{{ site.image }}",
        "telephone": "{{ site.phone }}",
        "priceRange": "₹₹₹₹",
        "starRating": { "@type": "Rating", "ratingValue": "5" },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "{{ site.address }}",
          "addressLocality": "Buxar",
          "addressRegion": "Bihar",
          "addressCountry": "IN"
        }
      },
      {
        "@type": "Restaurant",
        "@id": "{{ site.url }}/restaurant/#restaurant",
        "name": "Varda Restaurant",
        "description": "Fine dining luxury restaurant at Varda Resort.",
        "image": "{{ site.url }}{{ site.image }}",
        "telephone": "{{ site.phone }}",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "{{ site.address }}",
          "addressLocality": "Buxar",
          "addressRegion": "Bihar",
          "addressCountry": "IN"
        },
        "priceRange": "₹₹₹"
      }
    ]
  }
  </script>
  <!-- Preloader Critical CSS & Script -->
  <style>
    :root {
      --varda-gold: #C8A96A;
      --varda-black: #050505;
    }
    html.has-preloader, html.has-preloader body {
      overflow: hidden;
      height: 100vh;
    }
    .varda-preloader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000000 80%, #000000 100%);
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity 1.2s cubic-bezier(0.7, 0, 0.3, 1), visibility 1.2s cubic-bezier(0.7, 0, 0.3, 1);
    }

    html:not(.has-preloader) .varda-preloader {
      display: none !important;
    }

    .varda-preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(1);
      transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1);
    }

    .varda-preloader-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--varda-gold);
      letter-spacing: 0.5em;
      margin-left: 0.5em;
      opacity: 0;
      text-transform: uppercase;
      text-shadow: 0 0 0px rgba(200, 169, 106, 0);
      animation: plLogoReveal 1.2s cubic-bezier(0.2, 0, 0.2, 1) 0.3s forwards,
                 plLogoBreathe 4s ease-in-out 1.5s infinite alternate;
    }

    .varda-preloader-bar-wrap {
      margin-top: 40px;
      width: 140px;
      height: 1px;
      background: rgba(200, 169, 106, 0.2);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: plFadeIn 0.8s ease forwards 1s;
      transition: opacity 0.6s ease;
    }

    .varda-preloader-bar {
      width: 100%;
      height: 100%;
      background: var(--varda-gold);
      transform-origin: left;
      transform: scaleX(0);
      animation: plProgress 2.2s cubic-bezier(0.75, 0, 0.25, 1) 1.2s forwards;
      position: relative;
    }

    .varda-preloader-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: plShimmer 1.2s infinite;
    }

    @keyframes plLogoReveal {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); text-shadow: 0 0 25px rgba(200, 169, 106, 0.4); }
    }
    
    @keyframes plLogoBreathe {
      0% { text-shadow: 0 0 25px rgba(200, 169, 106, 0.4); }
      100% { text-shadow: 0 0 45px rgba(200, 169, 106, 0.7); }
    }

    @keyframes plFadeIn {
      to { opacity: 1; }
    }

    @keyframes plProgress {
      0% { transform: scaleX(0); }
      30% { transform: scaleX(0.3); }
      70% { transform: scaleX(0.7); }
      100% { transform: scaleX(1); }
    }

    @keyframes plShimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .varda-preloader.is-finishing {
      opacity: 0;
      visibility: hidden;
    }
    
    .varda-preloader.is-finishing .varda-preloader-content {
      transform: scale(0.95);
    }
    
    .varda-preloader.is-finishing .varda-preloader-bar-wrap {
      opacity: 0;
    }

    html.has-preloader body > header,
    html.has-preloader body > main,
    html.has-preloader body > footer,
    html.has-preloader body > div:not(.varda-preloader) {
      opacity: 0;
      transform: translateY(25px);
      pointer-events: none;
    }

    html.has-preloader.preloader-done body > header,
    html.has-preloader.preloader-done body > main,
    html.has-preloader.preloader-done body > footer,
    html.has-preloader.preloader-done body > div:not(.varda-preloader) {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 1.6s cubic-bezier(0.2, 0, 0.1, 1), transform 1.6s cubic-bezier(0.2, 0, 0.1, 1);
    }
  </style>
  <script>
    const navEntry = performance.getEntriesByType("navigation")[0];
    const isReload = navEntry && navEntry.type === "reload";
    const isNewSession = !sessionStorage.getItem('varda_session_active');
    
    if (isNewSession || isReload) {
      sessionStorage.setItem('varda_session_active', 'true');
      document.documentElement.classList.add('has-preloader');
      
      document.addEventListener('DOMContentLoaded', () => {
        const preloader = document.getElementById('vardaPreloader');
        setTimeout(() => {
          if (preloader) preloader.classList.add('is-finishing');
          document.documentElement.classList.add('preloader-done');
          setTimeout(() => {
            document.documentElement.classList.remove('has-preloader');
            document.documentElement.classList.remove('preloader-done');
            if (preloader) preloader.remove();
          }, 1600);
        }, 3600);
      });
    } else {
      document.addEventListener('DOMContentLoaded', () => {
        const preloader = document.getElementById('vardaPreloader');
        if (preloader) preloader.remove();
      });
    }
  </script>
</head>
<body class="{{ page.body_class | default: 'site-page' }}" data-page="{{ page.nav_key | default: '' }}">
  <div class="varda-preloader" id="vardaPreloader">
    <div class="varda-preloader-content">
      <div class="varda-preloader-logo">VARDA</div>
      <div class="varda-preloader-bar-wrap">
        <div class="varda-preloader-bar"></div>
      </div>
    </div>
  </div>
  {% include header.html %}

  <main id="content">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include book-dialog.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
