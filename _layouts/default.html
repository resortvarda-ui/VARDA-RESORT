---
layout: compress
---
<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <!-- SEO & Open Graph -->
  {% seo %}
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ page.image | default: site.image }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://images.unsplash.com">

  <!-- Fonts — Cormorant Garamond + Poppins + Montserrat -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"></noscript>

  <!-- Preload Hero Image -->
  {% if page.hero_image %}
  <link rel="preload" href="{{ page.hero_image | relative_url }}" as="image" fetchpriority="high">
  {% endif %}

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/preloader.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% for stylesheet in page.stylesheets %}
  <link rel="stylesheet" href="{{ stylesheet | relative_url }}?v={{ site.time | date: '%s' }}">
  {% endfor %}


  <!-- Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": ["Hotel", "LocalBusiness", "Organization"],
        "@id": "{{ site.url }}/#organization",
        "name": "{{ site.title }}",
        "description": "{{ site.description }}",
        "url": "{{ site.url }}",
        "logo": "{{ site.url }}{{ site.logo }}",
        "image": "{{ site.url }}{{ site.image }}",
        "telephone": [
          "{{ site.phone }}",
          "{{ site.phone_secondary }}"
        ],
        "priceRange": "₹₹₹₹",
        "starRating": { "@type": "Rating", "ratingValue": "5" },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "{{ site.address }}",
          "addressLocality": "Buxar",
          "addressRegion": "Bihar",
          "addressCountry": "IN"
        }
      },
      {
        "@type": "Restaurant",
        "@id": "{{ site.url }}/restaurant/#restaurant",
        "name": "Varda Restaurant",
        "description": "Fine dining luxury restaurant at Varda Resort.",
        "image": "{{ site.url }}{{ site.image }}",
        "telephone": [
          "{{ site.phone }}",
          "{{ site.phone_secondary }}"
        ],
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "{{ site.address }}",
          "addressLocality": "Buxar",
          "addressRegion": "Bihar",
          "addressCountry": "IN"
        },
        "priceRange": "₹₹₹"
      }
  </script>
</head>
<body class="{{ page.body_class | default: 'site-page' }}" data-page="{{ page.nav_key | default: '' }}">
  {% include preloader.html %}

  {% include header.html %}

  <main id="content">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Floating Widgets -->
  <div class="floating-widgets" aria-label="Quick Actions">
    <a href="https://wa.me/917808761001" class="float-btn float-wa" aria-label="Chat on WhatsApp" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.031 0C5.385 0 0 5.385 0 12.031c0 2.128.552 4.2 1.597 6.02L.057 24l6.104-1.602A11.968 11.968 0 0012.03 24c6.645 0 12.03-5.385 12.03-12.03S18.676 0 12.031 0zm0 22.016a9.98 9.98 0 01-5.083-1.39l-.364-.216-3.774.99 1.006-3.68-.238-.378a9.969 9.969 0 01-1.523-5.308c0-5.503 4.478-9.981 9.977-9.981s9.98 4.478 9.98 9.981-4.481 9.981-9.98 9.981zm5.45-7.465c-.298-.15-1.77-.874-2.043-.974-.274-.1-.472-.15-.672.15-.198.3-.772.974-.946 1.173-.174.2-.348.225-.646.075-.298-.15-1.263-.466-2.407-1.485-.888-.79-1.49-1.765-1.664-2.065-.174-.3-.018-.462.13-.612.135-.135.3-.35.45-.525.15-.175.2-.3.3-.5.1-.2.05-.375-.025-.525-.075-.15-.672-1.625-.92-2.225-.245-.584-.494-.505-.672-.514-.174-.01-.373-.01-.573-.01-.2 0-.523.075-.797.375-.274.3-1.045 1.025-1.045 2.5 0 1.475 1.072 2.9 1.222 3.1.15.2 2.11 3.225 5.112 4.525.713.308 1.27.49 1.705.629.715.228 1.368.196 1.883.118.575-.086 1.77-.723 2.02-1.423.25-.7.25-1.3.175-1.423-.075-.125-.275-.2-.575-.35z"/></svg>
    </a>
    <a href="tel:+917808761001" class="float-btn float-call" aria-label="Call Us">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </a>
  </div>

  <!-- Scripts -->
  <script src="{{ '/assets/js/preloader.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
  {% for script in page.scripts %}
  <script src="{{ script | relative_url }}" defer></script>
  {% endfor %}
</body>
</html>
